name: CI Pipeline

on:
  push:
    # Dodajemo feature/ci-cd na listu kako bi odmah videla rezultat
    branches: ["develop", "main", "feature/ci-cd"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Ovo će pokrenuti testove ako ih ima definisanih u package.json
        run: npm test --if-present

      - name: Build app
        run: npm run build
        env:
          # Neophodne promenljive da build ne bi "pukao"
          DATABASE_URL: "postgres://user:pass@localhost:5432/izlozba_db"
          NEXTAUTH_SECRET: "privremeni_tajni_kljuc_za_build"

      - name: Build Docker image
        # Ovde stavljamo ime projekta
        run: docker build -t izlozba-slika-app .